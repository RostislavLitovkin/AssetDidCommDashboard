name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Create .env from GitHub secrets
        run: |
          echo "NUXT_PUBLIC_XCAVATE_WS_ENDPOINT=${{ secrets.NUXT_PUBLIC_XCAVATE_WS_ENDPOINT }}" >> .env
          echo "NUXT_PUBLIC_PINATA_API_KEY=${{ secrets.NUXT_PUBLIC_PINATA_API_KEY }}" >> .env
          echo "NUXT_PUBLIC_PINATA_API_SECRET=${{ secrets.NUXT_PUBLIC_PINATA_API_SECRET }}" >> .env
          echo "NUXT_PUBLIC_PINATA_JWT=${{ secrets.NUXT_PUBLIC_PINATA_JWT }}" >> .env
          echo "NUXT_PUBLIC_PINATA_GATEWAY=${{ secrets.NUXT_PUBLIC_PINATA_GATEWAY }}" >> .env
      - run: npm ci
      - run: npm run generate
        env:
          NUXT_APP_BASE_URL: /AssetDidCommDashboard/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
